  <title>Soccer Party</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d2413; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    #dc-root { width: 100%; max-width: 460px; margin: 0 auto; }
    #__bundler_loading { position: fixed; bottom: 20px; left: 0; right: 0; text-align: center; font: 8px/1.5 'Press Start 2P', monospace; color: #9a8fb0; letter-spacing: 1px; background: transparent; z-index: 10000; }

    #__bundler_thumbnail svg { width: 100%; height: 100%; object-fit: contain; }
    #__bundler_placeholder { color: #999; font-size: 14px; }
    @keyframes dcpulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.14)} }

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

n  src: url(\"b5909759-2818-4891-a3ff-8e2203800043\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Press Start 2P';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"808543b4-1e7d-4470-aa9f-e1974a26c367\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}\n  html,body{height:100%;background:#0b0910;color:#f4e9c8;font-family:-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,sans-serif;overflow:hidden;touch-action:none;}\n  a{color:#c6e84a;text-decoration:none;} a:hover{color:#e6ff7a;}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div id=\"ns_wrap\" style=\"height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:8px;visibility:hidden;\">\n  <canvas id=\"ns_scorebug\" style=\"image-rendering:pixelated;border-radius:2px;box-shadow:0 4px 14px rgba(0,0,0,0.5);\"><\u002Fcanvas>\n  <div id=\"ns_status\" style=\"font-size:11px;color:#9a8fb0;min-height:14px;text-align:center;font-family:'Press Start 2P',monospace;line-height:1.6;\">Choose teams &amp; board<\u002Fdiv>\n  <div id=\"ns_stage\" style=\"position:relative;display:inline-block;overflow:hidden;\">\n    <canvas id=\"ns_game\" style=\"border-radius:2px;box-shadow:0 8px 30px rgba(0,0,0,0.6);image-rendering:pixelated;touch-action:none;display:block;transition:transform 0.24s cubic-bezier(.2,.75,.25,1);transform-origin:50% 50%;will-change:transform;\"><\u002Fcanvas>\n    <div id=\"ns_pre\" style=\"position:absolute;inset:0;display:none;overflow-y:auto;background:linear-gradient(180deg,rgba(10,8,20,0.68),rgba(6,5,12,0.92)),url(assets/generated/menu-bg.png) center bottom/cover no-repeat;background-color:#08060f;border-radius:2px;z-index:9;\"><\u002Fdiv>\n    <div id=\"ns_howto\" style=\"position:absolute;inset:0;display:none;overflow-y:auto;background:rgba(7,6,12,0.96);border-radius:2px;z-index:9;\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"ns_controls\" style=\"display:flex;gap:8px;flex-wrap:wrap;justify-content:center;touch-action:manipulation;\">\n    <button id=\"ns_teams\" style=\"background:#241a2e;color:#f4e9c8;border:2px solid #4a3a5e;padding:8px 11px;font-size:8px;cursor:pointer;font-family:'Press Start 2P',monospace;\">HOME<\u002Fbutton>\n    <button id=\"ns_start\" style=\"background:#241a2e;color:#f4e9c8;border:2px solid #4a3a5e;padding:8px 11px;font-size:8px;cursor:pointer;font-family:'Press Start 2P',monospace;\">START<\u002Fbutton>\n    <button id=\"ns_reset\" style=\"background:#241a2e;color:#f4e9c8;border:2px solid #4a3a5e;padding:8px 11px;font-size:8px;cursor:pointer;font-family:'Press Start 2P',monospace;\">RESTART<\u002Fbutton>\n    <button id=\"ns_ball\" style=\"background:#241a2e;color:#f4e9c8;border:2px solid #4a3a5e;padding:8px 11px;font-size:8px;cursor:pointer;font-family:'Press Start 2P',monospace;\">PIECE: COIN<\u002Fbutton>\n    <button id=\"ns_sound\" style=\"background:#241a2e;color:#f4e9c8;border:2px solid #4a3a5e;padding:8px 11px;font-size:8px;cursor:pointer;font-family:'Press Start 2P',monospace;\">SOUND: ON<\u002Fbutton>\n    <button id=\"ns_help\" style=\"background:#241a2e;color:#f4e9c8;border:2px solid #4a3a5e;padding:8px 11px;font-size:8px;cursor:pointer;font-family:'Press Start 2P',monospace;\">HOW TO PLAY<\u002Fbutton>\n  <\u002Fdiv>\n  <div id=\"ns_hint\" style=\"font-size:11px;color:#7a6b52;text-align:center;max-width:440px;line-height:1.6;\"><\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals(){ return {}; }\n  componentDidMount(){\n    const el = id => document.getElementById(id);\n    const canvas = el('ns_game'), ctx = canvas.getContext('2d');\n\n    // When true, the royale scorebug writes (immunity badge, ability slots) are\n    // held back so they don't run during the runtime's kickoff render commit —\n    // startRoyaleArena sets it, then clears it one frame later and re-renders.\n    var _royScoreDefer=false;\n\n    // ================= UI COLOR TOKENS =================\n    // Single source of truth for the game's menu/overlay palette. Every panel\n    // (onboarding, HOW TO PLAY, ability draft, results, achievements, shop)\n    // should draw its colours from PAL so the UI can't drift into one-off\n    // shades again. In-match/canvas art (pitch, kits, crowd) is separate — this\n    // is only the dark \"night-stadium\" chrome that frames the game.\n    //\n    // Sorts right after 00-bootstrap (before 01-layout), so PAL exists before\n    // any overlay builder runs. See docs/UI_TOKENS.md for the reference.\n    var PAL = {\n      // Panels / surfaces\n      scrim:     'rgba(6,4,10,0.86)',                 // full-screen overlay backdrop\n      panel:     'linear-gradient(#1a1330,#0e0a18)',  // modal / card ground\n      panelTop:  '#1a1330',\n      panelBase: '#0e0a18',\n      panelSoft: '#241a38',                            // raised rows / secondary buttons\n      // Framing\n      frame:     '#4a3a5e',                            // panel border\n      frameSoft: '#3a3050',                            // dividers / inactive dots & pips\n      // Text\n      head:      '#a9c94b',                            // titles / headings (accent green)\n      body:      '#c7bcd8',                            // body copy (lavender)\n      muted:     '#9a8fb0',                            // labels / secondary text\n      cream:     '#f4e9c8',                            // emphasis text on dark\n      ink:       '#0b1a0e',                            // text e patterns painted on nail heads + flag swatches\n    const PRESETS=[\n      {cat:'country',name:'Brazil',abbr:'BRA',primary:'#ffd400',kit:{type:'brazil',colors:['#009c3b','#ffdf00','#2b2f8f']}},\n      {cat:'country',name:'Argentina',abbr:'ARG',primary:'#74acdf',kit:{type:'argentina',colors:['#74acdf','#ffffff']}},\n      {cat:'country',name:'France',abbr:'FRA',primary:'#0055a4',kit:{type:'tricolor-v',colors:['#0055a4','#ffffff','#ef4135']}},\n      {cat:'country',name:'Spain',abbr:'ESP',primary:'#c60b1e',kit:{type:'spain',colors:['#c60b1e','#ffc400']}},\n      {cat:'country',name:'Germany',abbr:'GER',primary:'#dd0000',kit:{type:'tricolor-h',colors:['#1a1a1a','#dd0000','#ffce00']}},\n      {cat:'country',name:'England',abbr:'ENG',primary:'#cf142b',kit:{type:'cross',colors:['#ffffff','#cf142b']}},\n      {cat:'country',name:'Portugal',abbr:'POR',primary:'#da291c',kit:{type:'portugal',colors:['#0a6b34','#da291c']}},\n      {cat:'country',name:'Netherlands',abbr:'NED',primary:'#f36c21',kit:{type:'tricolor-h',colors:['#ae1c28','#ffffff','#21468b']}},\n      {cat:'country',name:'Italy',abbr:'ITA',primary:'#0a8a45',kit:{type:'tricolor-v',colors:['#0a8a45','#ffffff','#ce2b37']}},\n      {cat:'country',name:'Belgium',abbr:'BEL',primary:'#f9d616',kit:{type:'tricolor-v',colors:['#1a1a1a','#f9d616','#e30613']}},\n      {cat:'country',name:'Croatia',abbr:'CRO',primary:'#ff0000',kit:{type:'croatia',colors:['#ff0000','#ffffff','#171796']}},\n      {cat:'country',name:'Japan',abbr:'JPN',primary:'#bc002d',kit:{type:'dot',colors:['#ffffff','#bc002d']}},\n      {cat:'country',name:'USA',abbr:'USA',primary:'#3c3b6e',kit:{type:'usflag',colors:['#b22234','#3c3b6e','#ffffff']}},\n      {cat:'country',name:'Mexico',abbr:'MEX',primary:'#0a6847',kit:{type:'mexico',colors:['#0a6847','#ffffff','#ce1126']}},\n      {cat:'country',name:'Iceland',abbr:'ISL',primary:'#02529c',kit:{type:'nordic',colors:['#02529c','#ffffff','#dc1e35']}},\n      {cat:'country',name:'Senegal',abbr:'SEN',primary:'#1a 71796','#ffffff']}], JPN:[{type:'vstripes',colors:['#bc002d','#ffffff']},{type:'sash',colors:['#0b2c66','#ffffff']}], USA:[{type:'hbands',colors:['#b22234','#ffffff']},{type:'vstripes',colors:['#3c3b6e','#ffffff']}], MEX:[{type:'hhalves',colors:['#0a6847','#ce1126']},{type:'sash',colors:['#ce1126','#ffffff']}], ISL:[{type:'hbands',colors:['#02529c','#ffffff']},{type:'sash',colors:['#dc1e35','#ffffff']}], SEN:[{type:'vstripes',colors:['#fcd116','#1a9c4b']},{type:'sash',colors:['#e31b23','#fcd116']}], RED:[{type:'hbands',colors:['#d64b3a','#ffffff']},{type:'sash',colors:['#2a2a2a','#d64b3a']}], BLU:[{type:'vstripes',colors:['#3f74c7','#ffffff']},{type:'sash',colors:['#e8952f','#12203a']}], STR:[{type:'hbands',colors:['#1a1a1a','#ffffff']},{type:'sash',colors:['#c8102e','#1a1a1a']}], HOP:[{type:'vstripes',colors:['#0a8f3c','#ffffff']},{type:'sash',colors:['#23408f','#ffffff']}], SAS:[{type:'vstripes',colors:['#d1122c','#ffffff']},{type:'hbands',colors:['#1a2f66','#ffffff']}], ROY:[{type:'quarters',colors:['#5b2a86','#f2c200']},{type:'sash',colors:['#f2c200','#5b2a86']}], SKY:[{type:'vstripes',colors:['#5aa0d8','#ffffff']},{type:'sash',colors:['#d94f2b','#173a5e']}], RAV:[{type:'hbands',colors:['#111111','#e8b84a']},{type:'vstripes',colors:['#e8b84a','#111111']}]};\n    var KIT_EMBLEM={BRA:{sym:'ball',fg:'#009c3b'}, ARG:{sym:'sun',fg:'#f6b40e'}, FRA:{sym:'eagle',fg:'#0055a4'}, ESP:{sym:'crown',fg:'#c60b1e'}, GER:{sym:'shield',fg:'#1a1a1a'}, ENG:{sym:'shield',fg:'#cf142b'}, POR:{sym:'shield',fg:'#0a6b34'}, NED:{sym:'crown',fg:'#f36c21'}, ITA:{sym:'star',fg:'#0a8a45'}, BEL:{sym:'diamond',fg:'#e6b800'}, CRO:{sym:'checker',fg:'#c8102e'}, JPN:{sym:'disc',fg:'#bc002d'}, USA:{sym:'star',fg:'#3c3b6e'}, MEX:{sym:'eagle',fg:'#0a6847'}, ISL:{sym:'ring',fg:'#02529c'}, SEN:{sym:'star',fg:'#e31b23'}, RED:{sym:'ring',fg:'#d64b3a'}, BLU:{sym:'diamond',fg:'#3f74c7'}, STR:{sym:'bolt',fg:'#1a1a1a'}, HOP:{sym:'leaf',fg:'#0a8f3c'}, SAS:{sym:'cross',fg:'#d1122c'}, ROY:{sym:'crown',fg:'#5b2a86'}, SKY:{sym:'wave',fg:'#2f7bbf'}, RAV:{sym:'star6',fg:'#111111'}}; for(var _ka=0;_ka<PRESETS.length;_ka++){ var _kp=PRESETS[_ka]; if(KIT_ALT[_kp.abbr]) _kp.kit.alt=KIT_ALT[_kp.abbr]; if(KIT_EMBLEM[_kp.abbr] && _kp.kit.alt && _kp.kit.alt[1]) _kp.kit.alt[1].emblem=KIT_EMBLEM[_kp.abbr]; };\n    const byName=n=>PRESETS.findIndex(p=>p.name===n);\n    const COUNTRIES=PRESETS.filter(p=>p.cat==='country');\n    const CLUBS=PRESETS.filter(p=>p.cat==='club');\n    const catList=c=>c==='country'?COUNTRIES:CLUBS;\n    let teamKits={ red:COUNTRIES[0], blue:COUNTRIES[1] };\n    const primary=side=>teamKits[side].primary;\n\n    // paint a rectangular region with a kit pattern\n    function paintPattern(g,x,y,w,h,kit){\n      const c=kit.colors, t=kit.type;\n      g.fillStyle=c[0]; g.fillRect(x,y,w,h);\n      if(t==='solid') return;\n      if(t==='vhalves'){ g.fillStyle=c[1]; g.fillRect(x+Math.round(w/2),y,Math.ceil(w/2),h); }\n      else if(t==='hhalves'){ g.fillStyle=c[1]; g.fillRect(x,y+Math.round(h/2),w,Math.ceil(h/2)); }\n      else if(t==='vstripes'){ const n=4; for(let i=0;i<n;i++){ g.fillStyle=i%2?c[1]:c[0]; g.fillRect(x+Math.round(i*w/n),y,Math.ceil(w/n)+1,h);} }\n      else if(t==='hbands'){ const n=4; for(let i=0;i<n;i++){ g.fillStyle=i%2?c[1]:c[0]; g.fillRect(x,y+Math.round(i*h/n),w,Math.ceil(h/n)+1);} }\n      else if(t==='band'){ g.fillStyle=c[1]; g.fillRect(x,y+Math.round(h*0.36),w,Math.round(h*0.28)); }\n      else if(t==='sash'){ g.save(); g.beginPath(); g.rect(x,y,w,h); g.clip(); g.strokeStyle=c[1]; g.lineWidth=Math.max(2,w*0.34); g.beginPath(); g.moveTo(x-2,y+h+2); g.lineTo(x+w+2,y-2); g.stroke(); g.restore(); }\n      else if(t==='tricolor-v'){ for(let i=0;i<3;i++){ g.fillStyle=c[i]; g.fillRect(x+Math.round(i*w/3),y,Math.ceil(w/3)+1,h);} }\n      else if(t==='tricolor-h'){ for(let i=0;i<3;i++){ g.fillStyle=c[i]; g.fillRect(x,y+Math.round(i*h/3),w,Math.ceil(h/3)+1);} }\n      else if(t==='cross'){ g.fillStyle=c[1]; g.fillRect(x+Math.round(w*0.4),y,Math.max(2,M
