document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

02Fstyle>\n<style>\n  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}\n  html,body{height:100%;background:#0b0910;color:#e8ddca;font-family:-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,sans-serif;overflow:hidden;touch-action:none;}\n  a{color:#c6e84a;text-decoration:none;} a:hover{color:#e6ff7a;}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div id=\"ns_wrap\" style=\"height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:8px;\">\n  <canvas id=\"ns_scorebug\" style=\"image-rendering:pixelated;border-radius:2px;box-shadow:0 4px 14px rgba(0,0,0,0.5);\"><\u002Fcanvas>\n  <div id=\"ns_status\" style=\"font-size:11px;color:#c9b48a;min-height:14px;text-align:center;font-family:'Press Start 2P',monospace;line-height:1.6;\">Choose teams &amp; board<\u002Fdiv>\n  <div id=\"ns_stage\" style=\"position:relative;display:inline-block;\">\n    <canvas id=\"ns_game\" style=\"border-radius:2px;box-shadow:0 8px 30px rgba(0,0,0,0.6);image-rendering:pixelated;touch-action:none;display:block;\"><\u002Fcanvas>\n    <div id=\"ns_pre\" style=\"position:absolute;inset:0;display:none;overflow-y:auto;background:rgba(9,7,14,0.92);border-radius:2px;z-index:9;\"><\u002Fdiv>\n    <div id=\"ns_howto\" style=\"position:absolute;inset:0;display:none;overflow-y:auto;background:rgba(7,6,12,0.96);border-radius:2px;z-index:9;\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"ns_controls\" style=\"display:flex;gap:8px;flex-wrap:wrap;justify-content:center;touch-action:manipulation;\">\n    <button id=\"ns_teams\" style=\"background:#241a2e;color:#e8ddca;border:2px solid #4a3a5e;padding:8px 11px;font-size:8px;cursor:pointer;font-family:'Press Start 2P',monospace;\">HOME<\u002Fbutton>\n    <button id=\"ns_start\" style=\"background:#1f3a24;color:#cdeacb;border:2px solid #3f6b47;padding:8px 11px;font-size:8px;cursor:pointer;font-family:'Press Start 2P',monospace;\">START<\u002Fbutton>\n    <button id=\"ns_reset\" style=\"background:#241a2e;color:#e8ddca;border:2px solid #4a3a5e;padding:8px 11px;font-size:8px;cursor:pointer;font-family:'Press Start 2P',monospace;\">RESTART<\u002Fbutton>\n    <button id=\"ns_ball\" style=\"background:#241a2e;color:#e8ddca;border:2px solid #4a3a5e;padding:8px 11px;font-size:8px;cursor:pointer;font-family:'Press Start 2P',monospace;\">PIECE: COIN<\u002Fbutton>\n    <button id=\"ns_sound\" style=\"background:#241a2e;color:#e8ddca;border:2px solid #4a3a5e;padding:8px 11px;font-size:8px;cursor:pointer;font-family:'Press Start 2P',monospace;\">SOUND: ON<\u002Fbutton>\n    <button id=\"ns_help\" style=\"background:#241a2e;color:#e8ddca;border:2px solid #4a3a5e;padding:8px 11px;font-size:8px;cursor:pointer;font-family:'Press Start 2P',monospace;\">?<\u002Fbutton>\n  <\u002Fdiv>\n  <div id=\"ns_hint\" style=\"font-size:11px;color:#7a6b52;text-align:center;max-width:440px;line-height:1.6;\"><\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals(){ return {}; }\n  componentDidMount(){\n    const el = id => document.getElementById(id);\n    const canvas = el('ns_game'), ctx = canvas.getContext('2d');\n\n    // ---- Dimensions: board coords (W,H) inside a larger canvas with crowd stands ----\n    const PW=210, PH=280;\n    const CROWD_TB=10, CROWD_LR=12;\n    const W=PW, H=PH;\n    const CW=W+CROWD_LR*2, CH=H+CROWD_TB*2;\n    const OX=CROWD_LR, OY=CROWD_TB;\n    const WALL=12;\n    const GOAL_W=Math.round(W*0.36);\n    const COIN_R=5, NAIL_R=5;\n    const NET_DEPTH=13;\n\n    let SCALE=2;\n    canvas.width=CW; canvas.height=CH; ctx.imageSmoothingEnabled=false;\n    function fit(){\n      // measure the real chrome height (scorebug, status, controls, hint) so nothing is cut off\n      // on narrow/mobile screens where the controls row wraps to multiple lines\n      let chrome=250;\n      try{\n        const sb=el('ns_scorebug'), st=el('ns_status'), cn=el('ns_controls'), hn=el('ns_hint');\n        chrome = sb.offsetHeight + st.offsetHeight + cn.offsetHeight + 24; var _t=el('ns_top'),_b=el('ns_bot'); if(_t) chrome+=_t.offsetHeight+8; if(_b) chrome+=_b.offsetHeight+8;\n      }catch(e){}\n      var _fs=!!(document.fullscreenElement||document.webkitFullscreenElement); try{ document.documentElement.classList.toggle('ns-capped', !_fs); }catch(e){}\n      const availW=Math.min(window.innerWidth,_fs?960:460)-16, availH=window.innerHeight-chrome;\n      const sf=Math.min(availW/CW, availH/CH, 3.4);\n      SCALE=Math.max(0.6,sf);\n      canvas.style.width=(CW*SCALE)+'px'; canvas.style.height=(CH*SCALE)+'px';\n      sizeSB();\n    }\n\n    const COLORS={ coin:'#f4e9c8', coinEdge:'#b8a678' };\n\n    // ================= TEAM PRESETS (kits) =================\n    // kit.type patterns painted on nail heads + flag swatches\n    const PRESETS=[\n      {cat:'country',name:'Brazil',abbr:'BRA',primary:'#ffd400',kit:{type:'brazil',colors:['#009c3b','#ffdf00','#2b2f8f']}},\n      {cat:'country',name:'Argentina',abbr:'ARG',primary:'#74acdf',kit:{type:'argentina',colors:['#74acdf','#ffffff']}},\n      {cat:'country',name:'France',abbr:'FRA',primary:'#0055a4',kit:{type:'tricolor-v',colors:['#0055a4','#ffffff','#ef4135']}},\n      {cat:'country',name:'Spain',abbr:'ESP',primary:'#c60b1e',kit:{type:'spain',colors:['#c60b1e','#ffc400']}},\n      {cat:'country',name:'Germany',abbr:'GER',primary:'#dd0000',kit:{type:'tricolor-h',colors:['#1a1a1a','#dd0000','#ffce00']}},\n      {cat:'country',name:'England',abbr:'ENG',primary:'#cf142b',kit:{type:'cross',colors:['#ffffff','#cf142b']}},\n      {cat:'country',name:'Portugal',abbr:'POR',primary:'#da291c',kit:{type:'portugal',colors:['#0a6b34','#da291c']}},\n      {cat:'country',name:'Netherlands',abbr:'NED',primary:'#f36c21',kit:{type:'tricolor-h',colors:['#ae1c28','#ffffff','#21468b']}},\n      {cat:'country',name:'Italy',abbr:'ITA',primary:'#0a8a45',kit:{type:'tricolor-v',colors:['#0a8a45','#ffffff','#ce2b37']}},\n      {cat:'country',name:'Belgium',abbr:'BEL',primary:'#f9d616',kit:{type:'tricolor-v',colors:['#1a1a1a','#f9d616','#e30613']}},\n      {cat:'country',name:'Croatia',abbr:'CRO',primary:'#ff0000',kit:{type:'croatia',colors:['#ff0000','#ffffff','#171796']}},\n      {cat:'country',name:'Japan',abbr:'JPN',primary:'#bc002d',kit:{type:'dot',colors:['#ffffff','#bc002d']}},\n      {cat:'country',name:'USA',abbr:'USA',primary:'#3c3b6e',kit:{type:'usflag',colors:['#b22234','#3c3b6e','#ffffff']}},\n      {cat:'country',name:'Mexico',abbr:'MEX',primary:'#0a6847',kit:{type:'mexico',colors:['#0a6847','#ffffff','#ce1126']}},\n      {cat:'club',name:'Reds',abbr:'RED',primary:'#d64b3a',kit:{type:'solid',colors:['#d64b3a']}},\n      {cat:'club',name:'Blues',abbr:'BLU',primary:'#3f74c7',kit:{type:'solid',colors:['#3f74c7']}},\n      {cat:'club',name:'Stripes',abbr:'STR',primary:'#1a1a1a',kit:{type:'vstripes',colors:['#1a1a1a','#ffffff']}},\n      {cat:'club',name:'Hoops',abbr:'HOP',primary:'#0a8f3c',kit:{type:'hbands',colors:['#0a8f3c','#ffffff']}},\n      {cat:'club',name:'Sash',abbr:'SAS',primary:'#d1122c',kit:{type:'sash',colors:['#ffffff','#d1122c']}},\n      {cat:'club',name:'Royals',abbr:'ROY',primary:'#5b2a86',kit:{type:'vhalves',colors:['#5b2a86','#f2c200']}},\n      {cat:'club',name:'Sky',abbr:'SKY',primary:'#5aa0d8',kit:{type:'hbands',colors:['#5aa0d8','#ffffff']}},\n      {cat:'club',name:'Ravens',abbr:'RAV',primary:'#111111',kit:{type:'sash',colors:['#111111','#e8b84a']}}\n    ];\n    const byName=n=>PRESETS.findIndex(p=>p.name===n);\n    const COUNTRIES=PRESETS.filter(p=>p.cat==='country');\n    const CLUBS=PRESETS.filter(p=>p.cat==='club');\n    const catList=c=>c==='country'?COUNTRIES:CLUBS;\n    let teamKits={ red:COUNTRIES[0], blue:COUNTRIES[1] };\n    const primary=side=>teamKits[side].primary;\n\n    // paint a rectangular region with a kit pattern\n    function paintPattern(g,x,y,w,h,kit){\n      const c=kit.colors, t=kit.type;\n      g.fillStyle=c[0]; g.fillRect(x,y,w,h);\n      if(t==='solid') return;\n      if(t==='vhalves'){ g.fillStyle=c[1]; g.fillRect(x+Math.round(w/2),y,Math.ceil(w/2),h); }\n      else if(t==='hhalves'){ g.fillStyle=c[1]; g.fillRect(x,y+Math.round(h/2),w,Math.ceil(h/2)); }\n      else if(t==='vstripes'){ const n=4; for(let i=0;i<n;i++){ g.fillStyle=i%2?c[1]:c[0]; g.fillRect(x+Math.round(i*w/n),y,Math.ceil(w/n)+1,h);} }\n      else if(t==='hbands'){ const n=4; for(let i=0;i<n;i++){ g.fillStyle=i%2?c[1]:c[0]; g.fillRect(x,y+Math.round(i*h/n),w,Math.ceil(h/n)+1);} }\n      else if(t==='band'){ g.fillStyle=c[1]; g.fillRect(x,y+Math.round(h*0.36),w,Math.round(h*0.28)); }\n      else if(t==='sash'){ g.save(); g.beginPath(); g.rect(x,y,w,h); g.clip(); g.strokeStyle=c[1]; g.lineWidth=Math.max(2,w*0.34); g.beginPath(); g.moveTo(x-2,y+h+2); g.lineTo(x+w+2,y-2); g.stroke(); g.restore(); }\n      else if(t==='tricolor-v'){ for(let i=0;i<3;i++){ g.fillStyle=c[i]; g.fillRect(x+Math.round(i*w/3),y,Math.ceil(w/3)+1,h);} }\n      else if(t==='tricolor-h'){ for(let i=0;i<3;i++){ g.fillStyle=c[i]; g.fillRect(x,y+Math.round(i*h/3),w,Math.ceil(h/3)+1);} }\n      else if(t==='cross'){ g.fillStyle=c[1]; g.fillRect(x+Math.round(w*0.4),y,Math.max(2,Math.round(w*0.2)),h); g.fillRect(x,y+Math.round(h*0.4),w,Math.max(2,Math.round(h*0.2))); }\n      else if(t==='dot'){ g.fillStyle=c[1]; g.beginPath(); g.arc(x+w/2,y+h/2,Math.min(w,h)*0.28,0,Math.PI*2); g.fill(); }\n      else if(t==='quarters'){ g.fillStyle=c[1]; g.fillRect(x+Math.round(w/2),y,Math.ceil(w/2),Math.round(h/2)); g.fillRect(x,y+Math.round(h/2),Math.round(w/2),Math.ceil(h/2)); }\n      else if(t==='usflag'){\n        g.fillStyle='#ffffff'; g.fillRect(x,y,w,h);\n        const n=7; for(let i=0;i<n;i++){ if(i%2===0){ g.fillStyle='#b22234'; g.fillRect(x,y+Math.round(i*h/n),w,Math.ceil(h/n)+1); } }\n        const cw=Math.round(w*0.42), ch=Math.round(h*0.538);\n        g.fillStyle='#3c3b6e'; g.fillRect(x,y,cw,ch);\n        // staggered star field\n        g.fillStyle='#ffffff';\n        const cols=5, rows=4, sd=Math.max(1,Math.round(w*0.03));\n        for(let ry=0;ry<rows;ry++){ const off=(ry%2)?0.5:0; for(let rx=0;rx<cols;rx++){\n          const px=x+(rx+0.55+off)*(cw/(cols+0.5)), py=y+(ry+0.72)*(ch/(rows+0.35));\n          if(px<x+cw-1&&py<y+ch-1) g.fillRect(Math.round(px),Math.round(py),sd,sd);\n        } }\n      }\n      else if(t==='brazil'){\n        g.fillStyle='#009c3b'; g.fillRect(x,y,w,h);\n        g.fillStyle='#ffdf00'; g.beginPath();\n        g.moveTo(x+w/2,y+h*0.13); g.lineTo(x+w*0.87,y+h/2); g.lineTo(x+w/2,y+h*0.87); g.lineTo(x+w*0.13,y+h/2); g.closePath(); g.fill();\n        g.fillStyle='#2b2f8f'; g.beginPath(); g.arc(x+w/2,y+h/2,Math.min(w,h)*0.17,0,Math.PI*2); g.fill();\n        // little white stars on the globe\n        g.fillStyle='#ffffff'; const R=Math.min(w,h)*0.17; const sd=Math.max(1,Math.round(w*0.02));\n        g.fillRect(Math.round(x+w/2-R*0.4),Math.round(y+h/2-R*0.3),sd,sd);\n        g.fillRect(Math.round(x+w/2+R*0.3),Math.round(y+h/2+R*0.1),sd,sd);\n        g.fillRect(Math.round(x+w/2),Math.round(y+h/2+R*0.45),sd,sd);\n      }\n      else if(t==='argentina'){\n        g.fillStyle='#74acdf'; g.fillRect(x,y,w,h);\n        g.fillStyle='#ffffff'; g.fillRect(x,y+Math.round(h/3),w,Math.round(h/3)+1);\n        // Sun of May: rays + disc\n        const ex=x+w/2, ey=y+h/2, R=Math.max(1.3,Math.min(w,h)*0.12);\n        g.strokeStyle='#f6b40e'; g.lineWidth=Math.max(1,R*0.5);\n        const rays=8; for(let i=0;i<rays;i++){ const a=i/rays*Math.PI*2+0.2; g.beginPath(); g.moveTo(ex+Math.cos(a)*R*1.15,ey+Math.sin(a)*R*1.15); g.lineTo(ex+Math.cos(a)*R*1.95,ey+Math.sin(a)*R*1.95); g.stroke(); }\n        g.fillStyle='#f6b40e'; g.beginPath(); g.arc(ex,ey,R,0,Math.PI*2); g.fill();\n      }\n      else if(t==='spain'){\n        g.fillStyle=c[0]; g.fillRect(x,y,w,h);                                   // red\n        g.fillStyle=c[1]; g.fillRect(x,y+Math.round(h*0.25),w,Math.round(h*0.5)); // yellow middle band\n        // coat of arms, left of centre\n        const ex=x+Math.round(w*0.31), ey=y+Math.round(h*0.5);\n        const sw=Math.max(2,Math.round(w*0.14)), sh=Math.max(3,Math.round(h*0.3));\n        g.fillStyle='#8a1420'; g.fillRect(Math.round(ex-sw/2),Math.round(ey-sh/2),sw,sh);      // shield\n        g.fillStyle='#c8102e'; g.fillRect(Math.round(ex-sw/2)+1,Math.round(ey-sh/2)+1,Math.max(1,sw-2),Math.max(1,Math.round(sh*0.42)));\n        g.fillStyle='#f2c200'; g.fillRect(Math.round(ex-sw/2),Math.round(ey-sh/2)-Math.max(1,Math.round(h*0.07)),sw,Math.max(1,Math.round(h*0.07))); // crown\n      }\n      else if(t==='portugal'){\n        g.fillStyle=c[0]; g.fillRect(x,y,w,h);                                   // green\n        g.fillStyle=c[1]; g.fillRect(x+Math.round(w*0.4),y,Math.ceil(w*0.6)+1,h); // red 60%\n        // armillary sphere + shield on the division\n        const ex=x+Math.round(w*0.4), ey=y+Math.round(h*0.5), R=Math.max(2,Math.min(w,h)*0.24);\n        g.strokeStyle='#f2c200'; g.lineWidth=Math.max(1,R*0.26);\n        g.beginPath(); g.arc(ex,ey,R,0,Math.PI*2); g.stroke();                    // gold sphere ring\n        g.beginPath(); g.ellipse?g.ellipse(ex,ey,R,R*0.45,0,0,Math.PI*2):g.arc(ex,ey,R*0.7,0,Math.PI*2); g.stroke();\n        g.fillStyle='#ffffff'; g.fillRect(Math.round(ex-R*0.34),Math.round(ey-R*0.5),Math.max(1,Math.round(R*0.68)),Math.max(2,Math.round(R))); // white shield\n        g.fillStyle='#c8102e'; g.fillRect(Math.round(ex-R*0.18),Math.round(ey-R*0.3),Math.max(1,Math.round(R*0.36)),Math.max(1,Math.round(R*0.6)));\n      }\n      else if(t==='croatia'){\n        for(let i=0;i<3;i++){ g.fillStyle=c[i]; g.fillRect(x,y+Math.round(i*h/3),w,Math.ceil(h/3)+1); }  // red/white/blue\n        // checkerboard shield (šahovnica)\n        const cw2=Math.max(4,Math.round(w*0.32)), ch2=Math.max(4,Math.round(h*0.42));\n        const ex=Math.round(x+w/2-cw2/2), ey=Math.round(y+h/2-ch2/2), cells=4, cs=cw2/cells, rs=ch2/cells;\n        for(let ry=0;ry<cells;ry++) for(let rx=0;rx<cells;rx++){ g.fillStyle=((rx+ry)%2)?'#c8102e':'#ffffff'; g.fillRect(Math.round(ex+rx*cs),Math.round(ey+ry*rs),Math.ceil(cs),Math.ceil(rs)); }\n        g.strokeStyle='#ffffff'; g.lineWidth=1; g.strokeRect(ex+0.5,ey+0.5,cw2,ch2);\n      }\n      else if(t==='mexico'){\n        for(let i=0;i<3;i++){ g.fillStyle=c[i]; g.fillRect(x+Math.round(i*w/3),y,Math.ceil(w/3)+1,h); }  // green/white/red\n        // eagle-on-cactus emblem hint\n        const ex=x+w/2, ey=y+h/2, s=Math.max(1.4,Math.min(w,h)*0.13);\n        g.fillStyle='#0a6847'; g.fillRect(Math.round(ex-s*1.1),Math.round(ey+s*0.7),Math.round(s*2.2),Math.max(1,Math.round(s*0.6))); // wreath base\n        g.fillStyle='#6b4a2b'; g.beginPath(); g.arc(ex,ey,s,0,Math.PI*2); g.fill();                       // eagle body\n        g.fillStyle='#3a2a18'; g.fillRect(Math.round(ex+s*0.4),Math.round(ey-s*0.6),Math.max(1,Math.round(s*0.7)),Math.max(1,Math.round(s*0.5))); // wing\n      }\n    }\n    function paintNail(g,cx,cy,r,kit,active){\n      cx=Math.round(cx); cy=Math.round(cy);   // snap to pixel grid so every disc rasterizes identically\n      g.save();\n      g.fillStyle='rgba(0,0,0,0.35)'; g.beginPath(); g.arc(cx+1,cy+1.5,r,0,Math.PI*2); g.fill();\n      g.beginPath(); g.arc(cx,cy,r,0,Math.PI*2); g.clip();\n      paintPattern(g,cx-r,cy-r,r*2,r*2,kit);\n      g.restore();\n      g.beginPath(); g.arc(cx,cy,r,0,Math.PI*2); g.lineWidth=1; g.strokeStyle='rgba(0,0,0,0.45)'; g.stroke();\n      if(active){ g.beginPath(); g.arc(cx,cy,r+2,0,Math.PI*2); g.strokeStyle='rgba(255,255,255,0.6)'; g.lineWidth=1; g.stroke(); }\n    }\n\n    // ================= BOARD THEMES =================\n    const boardCanvas=document.createElement('canvas'); boardCanvas.width=W; boardCanvas.height=H;\n    const bc=boardCanvas.getContext('2d');\n\n    function grain(g,count,dark,light){ for(let n=0;n<count;n++){ const x=WALL+Math.random()*(W-WALL*2), y=WALL+Math.random()*(H-WALL*2), len=1+Math.random()*4; g.fillStyle=Math.random()>0.5?dark:light; g.fillRect(Math.round(x),Math.round(y),Math.round(len),1);} }\n\n    const BOARDS={\n      wood:{ name:'WOOD', surround:'#140f0a', stand:'#241a12', tier:'rgba(0,0,0,0.25)',\n        frame:'#6b4a28',frameHi:'#8a6338',frameLo:'#4a3018',post:'#d9d0be',\n        line:'rgba(245,235,210,0.5)',line2:'rgba(245,235,210,0.42)',\n        netRecess:'#241812',netBack:'rgba(0,0,0,0.35)',netMesh:'rgba(230,225,210,0.28)',netMouth:'rgba(255,250,235,0.18)',\n        netStrand:'rgba(238,233,218,0.6)',netOverlay:'rgba(20,14,10,0.5)',\n        surface(g){ const planks=6,pw=(W-WALL*2)/planks,tones=['#c98a4a','#c07f40','#bd7d3f','#c4854a','#b97a3c','#c68746']; for(let i=0;i<planks;i++){ g.fillStyle=tones[i%tones.length]; g.fillRect(Math.round(WALL+i*pw),WALL,Math.ceil(pw),H-WALL*2); g.fillStyle='rgba(90,60,30,0.35)'; g.fillRect(Math.round(WALL+i*pw),WALL,1,H-WALL*2);} grain(g,900,'rgba(80,50,20,0.18)','rgba(255,225,180,0.14)'); },\n        preview(g,w,h){ g.fillStyle='#c07f40'; g.fillRect(0,0,w,h); for(let i=0;i<5;i++){g.fillStyle='rgba(90,60,30,0.4)';g.fillRect(i*w/5,0,1,h);} } },\n\n      grass:{ name:'GRASS', surround:'#08160b', stand:'#0d2413', tier:'rgba(255,255,255,0.05)',\n        frame:'#12331b',frameHi:'#1c4a29',frameLo:'#0a2011',post:'#eef6ee',\n        line:'rgba(245,255,240,0.72)',line2:'rgba(245,255,240,0.6)',\n        netRecess:'#0a1a0f',netBack:'rgba(0,0,0,0.4)',netMesh:'rgba(240,255,240,0.3)',netMouth:'rgba(255,255,255,0.22)',\n        netStrand:'rgba(245,255,245,0.65)',netOverlay:'rgba(6,20,10,0.55)',\n        surface(g){ g.fillStyle='#2f8f3e'; g.fillRect(0,0,W,H); const bands=13,bh=(H-WALL*2)/bands; for(let i=0;i<bands;i++){ g.fillStyle=i%2?'#2b8339':'#34984a'; g.fillRect(WALL,Math.round(WALL+i*bh),W-WALL*2,Math.ceil(bh)+1);} for(let n=0;n<600;n++){ g.fillStyle=Math.random()>0.5?'rgba(20,80,30,0.16)':'rgba(190,235,180,0.12)'; g.fillRect(WALL+Math.random()*(W-WALL*2)|0,WALL+Math.random()*(H-WALL*2)|0,1,1);} },\n        preview(g,w,h){ for(let i=0;i<6;i++){g.fillStyle=i%2?'#2b8339':'#34984a';g onst py=y0+(r+0.5)*(bh/rows)+(Math.random()-0.5)*1.5;\n          const fanSide = side==='mix' ? (c%2?'red':'blue') : side;\n          const kc=teamKits[fanSide].kit.colors;\n          crowd.push({x:px,y:py,side:fanSide,shirt: beachy?BEACH_SHIRTS[Math.floor(Math.random()*BEACH_SHIRTS.length)]:vary(primary(fanSide)),skin:SKINS[(r*cols+c)%SKINS.length],phase:Math.random()*6.28,hop:0,hv:0,\n            flag: (t==='stadium')&&(Math.random()<0.32), flagCol: kc[Math.floor(Math.random()*Math.min(2,kc.length))]||primary(fanSide)});\n        }\n      }\n      const nearRing = (t==='urban');   // pedestrians hug the sidewalk, off the road\n      if(nearRing){\n        // thin ring of onlookers right beside the pitch (sidewalk), clear of the car lanes\n        band(OX+4, OY-11, W-8, 7, 'blue', 16, 1);\n        band(OX+4, OY+H+4, W-8, 7, 'red', 16, 1);\n        band(OX-11, OY+8, 7, H-16, 'mix', 1, 10);\n        band(OX+W+4, OY+8, 7, H-16, 'mix', 1, 10);\n      } else {\n        // deep bands, inset so no one ever overlaps the pitch frame (gravity: feet stay on the surround)\n                // top = blue fans\n          // bottom = red fans\n        band(3, OY+6, CROWD_LR-9, H-12, 'mix', 2, 15);         // left mixed\n        band(OX+W+6, OY+6, CROWD_LR-9, H-12, 'mix', 2, 15);    // right mixed\n      }\n    }\n    buildCrowd();\n\n    // ================= AMBIENCE (per-pitch scenery: beach umbrellas, snow, drones...) =================\n    let ambient=[];\n    function buildAmbient(){\n      ambient=[];\n      const t=ambType();\n      if(t==='beach'){\n        for(let i=0;i<5;i++) ambient.push({kind:'bird', x:Math.random()*CW, y:3+Math.random()*(OY-14), vx:0.18+Math.random()*0.22, phase:Math.random()*6.28});\n        ambient.push({kind:'ship', x:Math.random()*CW, y:7, vx:0.06});\n        ambient.push({kind:'ship', x:Math.random()*CW, y:CH-9, vx:-0.05, small:true});\n      } else if(t==='winter'){\n        for(let i=0;i<52;i++) ambient.push({kind:'snow', x:Math.random()*CW, y:M
