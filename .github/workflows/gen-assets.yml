name: Generate assets

# Cloud asset generation — no local setup needed.
# Run it from the GitHub "Actions" tab: pick "Generate assets" -> "Run workflow".
# It generates the PNGs with the Gemini API and opens a PR you can review + merge.
#
# One-time setup (see tools/README.md):
#   1. Settings -> Secrets and variables -> Actions -> New repository secret
#        name: GEMINI_API_KEY   value: <your key>
#   2. Settings -> Actions -> General -> Workflow permissions:
#        - "Read and write permissions"
#        - check "Allow GitHub Actions to create and approve pull requests"

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install generator deps
        working-directory: tools
        run: npm install

      - name: Generate assets
        working-directory: tools
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node gen-assets.mjs

      - name: Open a PR with the generated assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          if [ -z "$(git status --porcelain assets/generated)" ]; then
            echo "No new assets were produced (check the generate step log)."
            exit 0
          fi
          BRANCH="generated-assets-${{ github.run_number }}"
          git config user.name "asset-bot"
          git config user.email "asset-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add assets/generated
          git commit -m "Generated assets (run ${{ github.run_number }})"
          git push -u origin "$BRANCH"
          gh pr create \
            --base main --head "$BRANCH" \
            --title "Generated assets (run ${{ github.run_number }})" \
            --body "Auto-generated by the Gemini asset workflow. Review the PNGs in \`assets/generated/\` and merge to deploy."
