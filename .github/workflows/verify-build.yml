name: Verify build

# Guards the src/ -> index.html contract: index.html is generated by
# tools/build-game.mjs, so any push where it doesn't match src/ (hand-edited
# index.html, or a src/ change committed without rebuilding) fails here.

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: index.html matches src/
        run: node tools/build-game.mjs --check

      - name: game script parses
        run: |
          node -e "
            const fs=require('fs'),path=require('path');
            const dir='src/game';
            const parts=fs.readdirSync(dir).filter(f=>f.endsWith('.js')).sort();
            const code=parts.map(f=>fs.readFileSync(path.join(dir,f),'utf8').replace(/\n\$/,'')).join('\n');
            fs.writeFileSync('/tmp/game-concat.js','class DCLogic{}\n'+code);
          "
          node --check /tmp/game-concat.js
